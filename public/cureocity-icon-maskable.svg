<!--
  Maskable variant — content stays inside the inner safe zone (40%) so
  Android adaptive icons can crop into circles, squircles, etc.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#0a7a6e"/>
  <g fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800">
    <text x="50%" y="56%" text-anchor="middle" dominant-baseline="middle" font-size="180" letter-spacing="-6">Cx</text>
  </g>
</svg>
