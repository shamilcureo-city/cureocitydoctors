name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

# Don't waste runner minutes on stale runs when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + Build + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Engine + unit tests
        run: npm test

      - name: Build (verifies the bundle compiles)
        run: npm run build
